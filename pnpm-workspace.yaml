nodeLinker: hoisted
pmOnFail: error

allowedDeprecatedVersions:
  # Transient dependencies via grpc-tools -> @mapbox/node-pre-gyp
  # See https://github.com/grpc/grpc-node/issues/2968
  are-we-there-yet: "2"
  gauge: "3"
  glob: "7"
  inflight: "1"
  npmlog: "5"
  rimraf: "3"

allowBuilds:
  cpu-features: true
  esbuild: true
  grpc-tools: true
  protobufjs: true
  sharp: true
  ssh2: true
  unrs-resolver: true
